name: cfrna-qc-local
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R runtime and report rendering support.
  - r-base>=4.3
  - pandoc

  # CRAN packages used by Local_tool/scripts/*.R and the R Markdown report.
  - r-data.table
  - r-dplyr
  - r-dt
  - r-ggplot2
  - r-knitr
  - r-optparse
  - r-rmarkdown
  - r-scales
  - r-tidyr

  # Bioconductor packages used for normalization and ssGSEA scoring.
  - bioconductor-deseq2
  - bioconductor-gsva
